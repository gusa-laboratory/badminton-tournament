<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>本部ダッシュボード｜バドミントン大会</title>
<style>
  :root{
    --bg:#0f1720; --panel:#16212e; --panel2:#1b2735; --line:#243446;
    --txt:#f1f5f9; --muted:#90a4b8; --accent:#ffb300; --ok:#43a047;
    --a:#64b5f6; --b:#ef9a9a; --live:#43a047; --done:#7e96ac;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  .hidden{display:none !important;}
  body{
    background:var(--bg); color:var(--txt); min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    padding:18px 18px 60px;
  }
  /* dashboard slim top（試合経過を主役に） */
  .dashtop{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-bottom:14px;}
  .dinfo{display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; min-width:0;}
  .dname{font-size:17px; font-weight:800;}
  .dright{display:flex; align-items:center; gap:10px;}
  .room{font-size:11px; color:var(--muted);}
  .mode{font-size:11px; padding:2px 9px; border-radius:20px; background:#23303f; color:var(--accent); font-weight:700;}
  .count{font-size:12px; padding:2px 9px; border-radius:20px; background:#1c2836; color:var(--muted);}
  #hint{font-size:11px; color:#d98b8b;}

  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px;}
  .empty{color:var(--muted); font-size:14px; padding:40px 10px; text-align:center; border:1px dashed var(--line); border-radius:14px;}

  .card{background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:14px 16px; position:relative; overflow:hidden;}
  .card.done{opacity:.82;}
  .card .ctop{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:10px;}
  .court{font-size:13px; color:var(--muted);}
  .court b{font-size:26px; color:var(--txt); margin-right:4px; font-variant-numeric:tabular-nums;}
  .matchno{font-size:13px; color:var(--accent); font-weight:700;}
  .status{font-size:11px; font-weight:800; padding:3px 10px; border-radius:20px; white-space:nowrap;}
  .status.live{background:rgba(67,160,71,.18); color:#7bd389; border:1px solid rgba(67,160,71,.5);}
  .status.done{background:#26323f; color:var(--done); border:1px solid var(--line);}
  .status.live::before{content:"● "; color:var(--live);}

  .row{display:grid; grid-template-columns:1fr auto; align-items:center; gap:8px; padding:7px 0;}
  .row + .row{border-top:1px solid var(--line);}
  .who{min-width:0;}
  .nm{font-size:16px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .sb{font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .sc{font-size:34px; font-weight:800; font-variant-numeric:tabular-nums; line-height:1; min-width:46px; text-align:right;}
  .row.win .nm{color:var(--accent);}
  .serve{color:var(--accent); font-size:13px; margin-left:6px;}
  .pt{font-size:10px; font-weight:800; padding:1px 7px; border-radius:10px; margin-left:6px; vertical-align:middle;}
  .pt.game{background:#ef6c00; color:#fff;} .pt.match{background:#c62828; color:#fff;}

  .cfoot{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-top:11px; font-size:12px; color:var(--muted);}
  .games{display:flex; gap:6px; align-items:center;}
  .gc{background:#1c2836; padding:2px 9px; border-radius:20px; font-weight:700; color:var(--txt);}
  .past{display:flex; gap:5px; flex-wrap:wrap;}
  .past span{background:#11202e; padding:1px 7px; border-radius:6px; font-size:11px;}
  .upd{white-space:nowrap;}
  .upd.stale{color:#d98b8b;}

  /* home (大会の選択) */
  #home{max-width:480px; margin:30px auto 0;}
  #home h1{font-size:24px; margin:0 0 10px;}
  #home .lead{color:var(--muted); font-size:13px; line-height:1.7; margin:0 0 18px;}
  .homecard{background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:18px 16px;}
  .homecard label{display:block; font-size:13px; color:var(--muted); font-weight:600; margin:4px 0 6px;}
  .homecard input{width:100%; padding:12px 14px; border:2px solid var(--line); background:var(--panel2); color:var(--txt); border-radius:12px; font-size:16px; margin-bottom:12px;}
  .homecard input:focus{outline:none; border-color:var(--accent);}
  #openBtn{width:100%; padding:14px; border:none; border-radius:12px; font-size:16px; font-weight:700; background:var(--ok); color:#fff; cursor:pointer;}
  #recents{margin-top:22px;}
  #recents h3{font-size:13px; color:var(--muted); margin:0 0 8px;}
  .recent{display:flex; align-items:center; gap:8px; background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:4px 6px 4px 12px; margin-bottom:8px;}
  .recent:hover{border-color:var(--accent);}
  .rinfo{display:flex; align-items:center; justify-content:space-between; gap:10px; flex:1; min-width:0; cursor:pointer; padding:8px 0;}
  .recent .rn{font-weight:700;} .recent .rr{font-size:12px; color:var(--muted);}
  .rdel{background:none; border:none; color:#d98b8b; font-size:20px; line-height:1; cursor:pointer; padding:4px 10px; border-radius:8px;}
  .rdel:hover{background:rgba(217,139,139,.15);}
  .clearbtn{margin-top:6px; background:none; border:1px solid var(--line); color:#d98b8b; border-radius:10px; padding:8px 12px; font-size:13px; cursor:pointer;}
  .clearbtn:hover{border-color:#d98b8b;}
  #switchBtn{background:#37485c; border:none; color:#fff; border-radius:9px; padding:7px 12px; font-size:13px; font-weight:600; cursor:pointer; margin-left:auto;}
  .warn{color:#ef9a9a; font-size:12px; margin:10px 0 0; line-height:1.5;}
</style>
</head>
<body>
  <!-- HOME（大会の選択） -->
  <div id="home">
    <h1>🏸 本部ダッシュボード</h1>
    <p class="lead">大会名と合言葉を設定して、この大会のダッシュボードを開きます。<br>合言葉は各コート端末（大会用）と同じものにしてください。</p>
    <div class="homecard">
      <label>大会名</label>
      <input type="text" id="inName" placeholder="例：春季大会 2026">
      <label>合言葉（room）</label>
      <input type="text" id="inRoom" placeholder="例：ojg-spring-2026">
      <button id="openBtn">この大会を開く</button>
    </div>
    <div id="recents"></div>
    <button id="clearRecents" class="clearbtn hidden">🗑 大会の履歴を消去</button>
  </div>

  <!-- DASHBOARD（試合の経過だけを表示） -->
  <div id="dash" class="hidden">
    <div class="dashtop">
      <div class="dinfo">
        <span class="dname" id="dashName">本部</span>
        <span class="room" id="room"></span>
        <span class="mode" id="syncMode"></span>
        <span id="hint"></span>
      </div>
      <div class="dright">
        <span class="count" id="count">0 コート</span>
        <button id="switchBtn">別の大会へ</button>
      </div>
    </div>
    <div class="grid" id="grid"></div>
  </div>

<script src="firebase-config.js"></script>
<script src="sync.js"></script>
<script>
"use strict";
const $ = id => document.getElementById(id);

/* --- ゲーム/マッチポイント判定（court.html と同じロジック） --- */
function targetScore(mode){ return mode===15 ? 15 : 21; }
function cap(mode){ return mode===15 ? 21 : 30; }
function isGameWon(a,b,mode){
  if(a>=cap(mode)) return true;
  if(a>=targetScore(mode) && a-b>=2) return true;
  return false;
}
// side: 'A'|'B' があと1点でゲームを取れるか
function pointAway(m, side){
  const a = side==='A' ? m.scoreA : m.scoreB;
  const b = side==='A' ? m.scoreB : m.scoreA;
  return isGameWon(a+1, b, m.mode);
}

function relTime(ms){
  const d = Math.max(0, Math.floor((Date.now()-ms)/1000));
  if(d<5)  return '今';
  if(d<60) return d+'秒前';
  const mn = Math.floor(d/60);
  if(mn<60) return mn+'分前';
  return Math.floor(mn/60)+'時間前';
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function sideRow(m, side){
  const isA = side==='A';
  const score = isA ? m.scoreA : m.scoreB;
  const info  = isA ? m.a : m.b;
  const isWinner = m.status==='終了' && m.winner===side;
  const serving = m.serving===side;
  // point badge（終了時は出さない）
  let ptBadge = '';
  if(m.status!=='終了' && pointAway(m, side)){
    const isMatch = (isA ? m.gamesWon[0] : m.gamesWon[1]) === 1;
    ptBadge = `<span class="pt ${isMatch?'match':'game'}">${isMatch?'マッチP':'ゲームP'}</span>`;
  }
  return `
    <div class="row ${isWinner?'win':''}">
      <div class="who">
        <div class="nm">${esc(info.name)||(isA?'Aサイド':'Bサイド')}${serving?'<span class="serve">🏸</span>':''}${ptBadge}</div>
        ${info.sub ? `<div class="sb">${esc(info.sub)}</div>` : ''}
      </div>
      <div class="sc">${score}</div>
    </div>`;
}

function card(m){
  const done = m.status==='終了';
  const modeLabel = (m.mode===15?'15点':'21点') + '・' + (m.type==='doubles'?'ダブルス':'シングルス');
  const past = (m.pastGames&&m.pastGames.length)
    ? `<div class="past">${m.pastGames.map(g=>`<span>${g[0]}-${g[1]}</span>`).join('')}</div>` : '';
  const stale = (Date.now()-m.updatedAt) > 30000;
  return `
    <div class="card ${done?'done':''}">
      <div class="ctop">
        <div>
          <span class="court"><b>${esc(m.court)}</b>コート</span>
          ${m.matchNo?`<span class="matchno">${esc(m.matchNo)}</span>`:''}
        </div>
        <span class="status ${done?'done':'live'}">${done?'終了':'進行中'}</span>
      </div>
      ${sideRow(m,'A')}
      ${sideRow(m,'B')}
      <div class="cfoot">
        <span class="games"><span class="gc">ゲーム ${m.gamesWon[0]}-${m.gamesWon[1]}</span> ${past} <span style="color:#56708a">${modeLabel}</span></span>
        <span class="upd ${stale?'stale':''}">更新 ${relTime(m.updatedAt)}</span>
      </div>
    </div>`;
}

let current = {};
function render(){
  const ids = Object.keys(current);
  $('count').textContent = ids.length + ' コート';
  if(!ids.length){
    $('grid').innerHTML = `<div class="empty">まだ送信されているコートはありません。<br>各コート端末で「コート番号」を入れて試合を開始すると、ここに表示されます。</div>`;
    return;
  }
  // コート番号で並べ替え（数値優先）
  ids.sort((x,y)=>{
    const nx=parseInt(current[x].court,10), ny=parseInt(current[y].court,10);
    if(!isNaN(nx)&&!isNaN(ny)) return nx-ny;
    return String(current[x].court).localeCompare(String(current[y].court));
  });
  $('grid').innerHTML = ids.map(id=>card(current[id])).join('');
}

/* --- 最近の大会（localStorage） --- */
const RECENTS_KEY = 'bdmt:hq:recents';
function loadRecents(){ try{ return JSON.parse(localStorage.getItem(RECENTS_KEY)||'[]'); }catch(e){ return []; } }
function saveRecent(name, room){
  let r = loadRecents().filter(x=>x.room!==room);
  r.unshift({name:name||'', room});
  localStorage.setItem(RECENTS_KEY, JSON.stringify(r.slice(0,6)));
}
function removeRecent(room){
  const r = loadRecents().filter(x=>x.room!==room);
  localStorage.setItem(RECENTS_KEY, JSON.stringify(r));
}
function renderRecents(){
  const r = loadRecents();
  $('clearRecents').classList.toggle('hidden', r.length===0);
  if(!r.length){ $('recents').innerHTML=''; return; }
  $('recents').innerHTML = '<h3>最近の大会</h3>' + r.map(x=>
    `<div class="recent">
       <div class="rinfo" data-room="${encodeURIComponent(x.room)}" data-name="${encodeURIComponent(x.name||'')}">
         <span class="rn">${esc(x.name||x.room)}</span><span class="rr">${esc(x.room)}</span>
       </div>
       <button class="rdel" data-room="${encodeURIComponent(x.room)}" data-name="${encodeURIComponent(x.name||'')}" title="この大会を削除（スコアも消去）">×</button>
     </div>`).join('');
  document.querySelectorAll('.rinfo').forEach(el=>{
    el.onclick=()=>openDashboard(decodeURIComponent(el.dataset.room), decodeURIComponent(el.dataset.name));
  });
  document.querySelectorAll('.rdel').forEach(el=>{
    el.onclick=(e)=>{ e.stopPropagation(); deleteOne(decodeURIComponent(el.dataset.room), decodeURIComponent(el.dataset.name)); };
  });
}
function deleteOne(room, name){
  if(!confirm(`「${name||room}」を削除します。\nこの大会の記録されたスコアも完全に消去されます。\n（他の端末で開いていても消えます）\n\nよろしいですか？`)) return;
  CourtSync.whenReady(()=>{
    CourtSync.purgeRoom(room).catch(e=>console.error(e)).finally(()=>{
      removeRecent(room);
      renderRecents();
    });
  });
}

/* --- ルーティング --- */
function openDashboard(room, name){
  const r = CourtSync.sanitizeRoom(room);
  location.search = '?room=' + encodeURIComponent(r) + (name ? '&name=' + encodeURIComponent(name) : '');
}
function startDash(room, name){
  $('home').classList.add('hidden');
  $('dash').classList.remove('hidden');
  $('dashName').textContent = name || room;
  document.title = (name || room) + '｜本部ダッシュボード';
  CourtSync.whenReady(()=>{
    CourtSync.init({ room, backend:'auto' });
    $('room').textContent = 'room: ' + CourtSync.room;
    $('syncMode').textContent = CourtSync.mode==='firebase' ? 'Firebase 同期' : 'ローカル同期';
    $('hint').textContent = CourtSync.mode==='firebase' ? ''
      : (window.FIREBASE_CONFIG ? '⚠ Firebaseに接続できませんでした。この端末内のローカル動作です。' : '※ ローカル同期（同一ブラウザのタブ間）で動作中。');
    CourtSync.subscribe(store=>{ current = store || {}; render(); });
  });
}
function showHome(){
  $('dash').classList.add('hidden');
  $('home').classList.remove('hidden');
  renderRecents();
}

const params = new URLSearchParams(location.search);
const urlRoom = params.get('room');
const urlName = params.get('name') || '';
if(urlRoom){
  const r = CourtSync.sanitizeRoom(urlRoom);
  if(urlName) saveRecent(urlName, r);
  startDash(r, urlName);
} else {
  showHome();
}

$('openBtn').onclick=()=>{
  const room=$('inRoom').value.trim();
  if(!room){ $('inRoom').focus(); return; }
  openDashboard(room, $('inName').value.trim());
};
$('switchBtn').onclick=()=>{ location.href = location.pathname; };
$('clearRecents').onclick=()=>{
  const list = loadRecents();
  if(!list.length) return;
  if(!confirm(`最近の大会 ${list.length}件をすべて削除します。\n各大会の記録されたスコアも完全に消去されます。\n（他の端末で開いていても消えます）\n\nよろしいですか？`)) return;
  CourtSync.whenReady(()=>{
    Promise.all(list.map(x=>CourtSync.purgeRoom(x.room).catch(e=>console.error(e)))).finally(()=>{
      localStorage.removeItem(RECENTS_KEY);
      renderRecents();
    });
  });
};
setInterval(render, 1000);   // 「更新○秒前」を毎秒更新
</script>
<script type="module" src="firebase-boot.js"></script>
</body>
</html>
